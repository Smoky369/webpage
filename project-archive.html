<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Archive — Activity Log</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Michroma&family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <link rel="stylesheet" href="./css/cursor.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <style>
      body {
        min-height: 100vh;
        padding: 2rem;
        background: radial-gradient(circle at top, rgba(57,255,136,0.12), transparent 44%), var(--bg, #05070a);
      }
      .archive-shell {
        width: min(1480px, 100%);
        max-width: none;
        margin: 0 auto;
        display: grid;
        gap: 1.25rem;
        align-content: start;
        padding: 0.25rem 0;
      }
      .archive-banner {
        border: 1px solid rgba(57,255,136,0.2);
        background: linear-gradient(135deg, rgba(8,10,14,0.95), rgba(12,18,24,0.9));
        padding: 1.5rem 1.75rem;
        box-shadow: 0 0 26px rgba(57,255,136,0.12);
        border-radius: 24px;
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .archive-banner h1 {
        margin: 0 0 0.45rem;
        font-size: clamp(1.4rem, 2.6vw, 2.15rem);
        color: var(--green);
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      .archive-banner p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
        max-width: 42rem;
      }
      .archive-banner .archive-pill {
        border: 1px solid rgba(92,225,255,0.26);
        color: var(--cyan);
        padding: 0.6rem 0.95rem;
        border-radius: 999px;
        font-size: 0.78rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        background: rgba(92,225,255,0.09);
      }
      .archive-page {
        display: grid;
        gap: 1rem;
      }
      .archive-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1.1rem;
        align-items: start;
        width: 100%;
      }
      @media (max-width: 1200px) {
        .archive-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 820px) {
        body { padding: 1rem; }
        .archive-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 620px) {
        body { padding: 0.9rem; }
        .archive-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="archive-shell">
      <div class="archive-banner">
        <div>
          <h1>Activity Log</h1>
          <p>A full log of logs, status signals, and progress milestones.</p>
        </div>
        <div class="archive-pill">6 Logs</div>
      </div>
      <div id="projects-grid" class="archive-container"></div>
    </div>
    <div id="modal-root" class="modal-root" aria-hidden="true">
      <div class="modal-card">
        <button class="modal-close" id="modal-close">×</button>
        <div id="modal-content"></div>
      </div>
    </div>
    <script type="module" src="./js/projects.js"></script>
  </body>
</html>
